name: Contract

# 跨仓契约门禁:contract/events.yaml 是单源,verify.py 校验 6 镜像(agent/session/web)一致。
# 四仓独立(非 submodule),故 CI 把三仓 checkout 进相对路径再跑 verify。
# 注:这种"跨独立仓校验"的别扭正是 monorepo 收敛的论据(见 quality-assessment 架构打磨项)。

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: LordFoxFairy/kokoro-agent
          ref: main
          path: kokoro-agent
          # 若 sibling 仓为私有,需配置一个有读权限的 PAT secret 并在此传 token:。
      - uses: actions/checkout@v4
        with:
          repository: LordFoxFairy/kokoro-session
          ref: main
          path: kokoro-session
      - uses: actions/checkout@v4
        with:
          repository: LordFoxFairy/kokoro-web
          ref: main
          path: kokoro-web
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - name: contract verify
        run: python3 contract/verify.py
      # codegen 门禁：events.yaml 改了但忘了重生成镜像 → --check 非零。
      - name: contract generate --check
        run: python3 contract/generate.py --check
